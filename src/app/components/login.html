<div class="min-h-screen flex items-center justify-center bg-slate-50 p-4 transition-colors duration-300">
  <div #loginCard class="w-full max-w-md bg-white border border-slate-200 rounded-3xl p-8 shadow-xl transition-colors duration-300">
    <div class="flex flex-col items-center mb-8">
      <app-logo [size]="72" [showText]="false"></app-logo>
      <h2 class="text-2xl font-black text-slate-800 mt-4 tracking-tight">{{ lang.t('welcome') }}</h2>
      <p class="text-sm text-slate-500 mt-1">{{ lang.t('portalSubtitle') }}</p>
    </div>

    @if (errorMsg()) {
      <div class="mb-5 p-4 rounded-xl bg-red-50 border border-red-200 text-red-700 text-sm flex items-start gap-2.5">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5 shrink-0 mt-0.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 1 1-18 0 9 9 0 0 1 18 0Zm-9 3.75h.008v.008H12v-.008Z" />
        </svg>
        <span>{{ errorMsg() }}</span>
      </div>
    }

    <form (submit)="onSubmit()" class="space-y-5">
      <div>
        <label class="block text-xs font-bold uppercase tracking-wider text-slate-600 mb-2">{{ lang.t('email') }}</label>
        <div class="relative">
          <input 
            type="email" 
            name="email"
            [(ngModel)]="email" 
            required
            class="w-full px-4 py-3 rounded-xl border border-slate-200 bg-slate-50 focus:outline-none focus:ring-2 focus:ring-brand-red focus:border-transparent text-slate-800 transition-all text-sm"
            placeholder="name@domain.com"
          />
        </div>
      </div>

      <div>
        <label class="block text-xs font-bold uppercase tracking-wider text-slate-600 mb-2">{{ lang.t('password') }}</label>
        <div class="relative">
          <input 
            type="password" 
            name="password"
            [(ngModel)]="password" 
            required
            class="w-full px-4 py-3 rounded-xl border border-slate-200 bg-slate-50 focus:outline-none focus:ring-2 focus:ring-brand-red focus:border-transparent text-slate-800 transition-all text-sm"
            placeholder="••••••••"
          />
        </div>
      </div>

      <button 
        type="submit" 
        [disabled]="loading()"
        class="w-full py-3.5 px-4 bg-brand-red hover:bg-brand-red-dark text-white font-bold rounded-xl shadow-lg transition-all focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-brand-red active:scale-[0.98] disabled:opacity-50 disabled:pointer-events-none mt-2 flex justify-center items-center gap-2"
      >
        @if (loading()) {
          <svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
          </svg>
          <span>{{ lang.currentLang() === 'en' ? 'Verifying credentials...' : 'جاري التحقق من البيانات...' }}</span>
        } @else {
          <span>{{ lang.t('signIn') }}</span>
        }
      </button>
    </form>

    <div class="mt-8 text-center border-t border-slate-100 pt-6">
      <p class="text-sm text-slate-500">
        {{ lang.t('noAccount') }} 
        <a routerLink="/register" class="text-brand-red hover:text-brand-red-dark font-bold underline">{{ lang.t('createAccount') }}</a>
      </p>
    </div>
  </div>
</div>
